name: 🚀 Build & Release (Manual Versioning)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  release:
    name: Release Plugin
    runs-on: ubuntu-latest

    steps:
      # ─── Step 1: Checkout repository ──────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Step 2: Set up PHP ────────────────────────────────────
      - name: 🐘 Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      # ─── Step 3: Install Composer dependencies ─────────────────
      - name: 📦 Install Composer
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-dev --optimize-autoloader --prefer-dist
          fi

      # ─── Step 4: Get version from plugin file ──────────────────
      - name: 🔍 Read version from PHP
        id: get_version
        run: |
          # Finds the version number you wrote in the file
          VERSION=$(grep -m 1 "Version:" super-elem-pro.php | sed 's/[^0-9.]*//g')
          echo "VER=$VERSION" >> $GITHUB_OUTPUT
          echo "Target Version: $VERSION"

      # ─── Step 5: Build production ZIP ─────────────────────────
      - name: 📦 Build production ZIP
        run: |
          VERSION="${{ steps.get_version.outputs.VER }}"
          ZIP_NAME="super-elem-pro-v$VERSION.zip"
          mkdir -p build/super-elem-pro
          
          # Copy files excluding dev junk
          rsync -av ./ build/super-elem-pro/ \
            --exclude '.git*' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude 'composer.*'
          
          cd build
          zip -r "../$ZIP_NAME" super-elem-pro/

      # ─── Step 6: Create GitHub Release ────────────────────────
      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VER }}
          name: Super Elem Pro v${{ steps.get_version.outputs.VER }}
          body: |
            ## 🚀 Release v${{ steps.get_version.outputs.VER }}
            Manual versioning release.
            Author: Rohit
          files: super-elem-pro-v${{ steps.get_version.outputs.VER }}.zip
          # If the version tag already exists, this will update the existing release
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}