name: 🔒 Obfuscate & Build Protected Release

on:
  # Manual trigger only — run this when you want a protected build
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version to obfuscate (leave empty for current)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  obfuscate:
    name: Obfuscate PHP and Build Protected ZIP
    runs-on: ubuntu-latest

    steps:

      # ─── Step 1: Checkout ─────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Step 2: Set up PHP ────────────────────────────────────
      - name: 🐘 Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      # ─── Step 3: Install Composer dependencies ─────────────────
      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      # ─── Step 4: Get version ───────────────────────────────────
      - name: 🔍 Get version
        id: get_version
        run: |
          VERSION=$(grep "Version:" super-elem-pro.php | head -1 | awk '{print $NF}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ─── Step 5: Install yakpro-po (YAK Pro Obfuscator) ───────
      - name: 🔒 Install YAK Pro PHP Obfuscator
        run: |
          git clone --depth=1 https://github.com/pk-fr/yakpro-po.git /tmp/yakpro-po
          cd /tmp/yakpro-po
          composer install --no-dev --quiet
          chmod +x yakpro-po.php
          echo "YAK Pro installed"

      # ─── Step 6: Prepare build directory ──────────────────────
      - name: 📁 Prepare build directory
        run: |
          mkdir -p /tmp/obfuscated/super-elem-pro
          
          # Copy all non-PHP files first (assets, templates, languages, vendor)
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.php' \
            --exclude='tests' \
            ./ /tmp/obfuscated/super-elem-pro/

      # ─── Step 7: Obfuscate PHP files ──────────────────────────
      - name: 🔒 Obfuscate PHP files
        run: |
          # Create yakpro config
          cat > /tmp/yakpro-config.php << 'EOF'
          <?php
          // YAK Pro Obfuscator Configuration
          $conf->shuffle_statements            = true;
          $conf->obfuscate_string_literal      = true;
          $conf->obfuscate_loop_statement      = true;
          $conf->obfuscate_if_statement        = true;
          $conf->obfuscate_function_name       = false;  // Keep for WP hooks
          $conf->obfuscate_class_name          = false;  // Keep for autoloader
          $conf->obfuscate_variable_name       = true;
          $conf->obfuscate_define_name         = false;  // Keep constants readable
          $conf->obfuscate_comment             = true;   // Remove comments
          $conf->obfuscate_namespace           = false;  // Keep namespaces
          $conf->strip_indentation             = true;
          EOF
          
          # Obfuscate each PHP file
          find . -name "*.php" \
            -not -path './.git/*' \
            -not -path './vendor/*' \
            -not -path './tests/*' | while read -r php_file; do
            
            # Get relative path
            rel_path="${php_file#./}"
            
            # Create output directory
            mkdir -p "/tmp/obfuscated/super-elem-pro/$(dirname "$rel_path")"
            
            # Obfuscate the file
            php /tmp/yakpro-po/yakpro-po.php \
              --config /tmp/yakpro-config.php \
              "$php_file" \
              -o "/tmp/obfuscated/super-elem-pro/$rel_path" 2>/dev/null || \
            # If obfuscation fails, copy as-is
            cp "$php_file" "/tmp/obfuscated/super-elem-pro/$rel_path"
            
          done
          
          echo "✅ PHP obfuscation complete"

      # ─── Step 8: Copy vendor (already optimized) ──────────────
      - name: 📦 Copy vendor directory
        run: |
          rsync -av \
            --exclude='squizlabs' \
            --exclude='wp-coding-standards' \
            ./vendor/ /tmp/obfuscated/super-elem-pro/vendor/

      # ─── Step 9: Create obfuscated ZIP ────────────────────────
      - name: 📦 Create obfuscated ZIP
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ZIP_NAME="super-elem-pro-v${VERSION}-protected.zip"
          
          cd /tmp/obfuscated
          zip -r "$ZIP_NAME" super-elem-pro/
          
          mv "$ZIP_NAME" "$GITHUB_WORKSPACE/"
          echo "✅ Protected ZIP created: $ZIP_NAME"

      # ─── Step 10: Upload obfuscated ZIP to latest release ─────
      - name: 📤 Upload protected ZIP to GitHub Release
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ZIP_NAME="super-elem-pro-v${VERSION}-protected.zip"
          
          # Upload to the latest release
          gh release upload "v$VERSION" "$ZIP_NAME" \
            --clobber \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}