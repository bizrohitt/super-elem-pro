name: 🚀 Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Get Version
        id: get_version
        run: |
          VERSION=$(grep "Version:" super-elem-pro.php | head -1 | awk '{print $NF}')
          echo "VER=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION"

      - name: 📦 Build ZIP
        run: |
          VERSION="${{ steps.get_version.outputs.VER }}"
          ZIP_NAME="super-elem-pro-v$VERSION.zip"
          
          mkdir -p build/super-elem-pro
          rsync -av ./ build/super-elem-pro/ --exclude '.git*' --exclude '.github' --exclude 'build'
          
          cd build
          zip -r "../$ZIP_NAME" super-elem-pro/
          cd ..
          
          if [ -f "$ZIP_NAME" ]; then
            echo "✅ ZIP created: $ZIP_NAME"
          else
            echo "❌ ZIP creation failed!"
            exit 1
          fi

      - name: 🎉 Create/Update Release
        run: |
          VERSION="${{ steps.get_version.outputs.VER }}"
          ZIP_NAME="super-elem-pro-v$VERSION.zip"
          TAG="v$VERSION"
          
          gh release create "$TAG" "$ZIP_NAME" \
            --title "Super Elem Pro $TAG" \
            --notes "Automated build for version $VERSION. Pushed to main." \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}